  <body>
    <div id="root"></div>

    <!--
      Static form mirrors. Netlify Forms scans the deployed HTML at build time
      to register form fields, so every form the React app POSTs to needs a
      hidden mirror here with a matching `name` attribute and the same fields.
    -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="inquiry-for" />
      <input type="text" name="location-name" />
      <textarea name="message"></textarea>
    </form>

    <form name="care-recommendations" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="location" />
      <input type="text" name="care-type" />
      <input type="text" name="urgency" />
      <input type="text" name="budget" />
      <textarea name="additional-info"></textarea>
    </form>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
